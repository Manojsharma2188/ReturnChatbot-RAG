spring.application.name=Returnchatbot

# ===== Server =====
server.port=9090

# ===== PostgreSQL =====
spring.datasource.url=jdbc:postgresql://localhost:5432/chatbot_db
spring.datasource.username=postgres
spring.datasource.password=postgres123
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ===== Ollama Chat Model =====
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.model=llama3.2

# ===== Ollama Embedding Model =====
spring.ai.ollama.embedding.base-url=http://localhost:11434
spring.ai.ollama.embedding.model=nomic-embed-text

# ===== Qdrant Vector Store =====
spring.ai.vectorstore.qdrant.host=localhost
spring.ai.vectorstore.qdrant.port=6333
spring.ai.vectorstore.qdrant.collection-name=returns-docs

# ===== Knowledge Base =====
app.knowledge-base.path=knowledge-base
app.knowledge-base.chunk-size=500
app.knowledge-base.chunk-overlap=50